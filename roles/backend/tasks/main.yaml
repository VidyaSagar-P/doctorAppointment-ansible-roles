- name: install python dependencies
  ansible.builtin.pip:
    name: "{{item}}"
    executable: pip3.9
  loop:
  - PyMySQL
  - cryptography

- name: install maven
  ansible.builtin.package:
    name: "{{item}}"
    state: present
  loop:
  - maven
  - mysql

- name: Create a system user
  ansible.builtin.user: 
    name: doctor
    shell: /sbin/nologin
    system: yes
    home: /app

- name: import tasks from common role
  ansible.builtin.import_role:
    name: common
    tasks_from: app-pre-req

- name: Copy jar file to app directory
  ansible.builtin.copy:
    src: /app/target/HospitalAppointment-0.0.1-SNAPSHOT.jar
    dest: /app/doctorapp.jar
    remote_src: yes

- name: Copy the service file
  ansible.builtin.template: #copy module is only is used to file without variables
    src: doctor.service.j2
    dest: /etc/systemd/system/doctor.service
  notify: 
  - daemon reload
  - start doctor servie

- name: Import the data to mysql server
  community.mysql.mysql_db:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_host: "{{ login_host }}"
    target: /app/db/app-user.db
    name: all
    state: import

# - name: daemon reload
#   ansible.builtin.systemd_service:
#     daemon_reload: true

- name: enable backend serive
  ansible.builtin.service:
    name: doctor
    enabled: yes

